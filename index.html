<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nevco 4770 Hockey Scoreboard Emulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- ============== SCOREBOARD (Nevco 4760) ============== -->
    <section class="scoreboard" aria-label="Nevco 4760 scoreboard">
      <div class="sb-board">

        <!-- Home penalties: outermost column.
             Image layout: [player # | penalty time], two rows. -->
        <div class="sb-pens sb-pens-home" aria-label="home penalties">
          <div class="sb-pen-row">
            <div class="sb-cell">
              <div class="sb-tag">player</div>
              <div class="seg seg-amber seg-2">
                <span class="seg-bg">88</span>
                <span class="seg-fg" id="home-pen1-player">--</span>
              </div>
            </div>
            <div class="sb-cell">
              <div class="sb-tag">penalty</div>
              <div class="seg seg-red seg-4">
                <span class="seg-bg">88:88</span>
                <span class="seg-fg" id="home-pen1-time">0:00</span>
              </div>
            </div>
          </div>
          <div class="sb-pen-row">
            <div class="sb-cell">
              <div class="sb-tag">player</div>
              <div class="seg seg-amber seg-2">
                <span class="seg-bg">88</span>
                <span class="seg-fg" id="home-pen2-player">--</span>
              </div>
            </div>
            <div class="sb-cell">
              <div class="sb-tag">penalty</div>
              <div class="seg seg-red seg-4">
                <span class="seg-bg">88:88</span>
                <span class="seg-fg" id="home-pen2-time">0:00</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Home score -->
        <div class="sb-cell sb-score-cell">
          <div class="sb-tag sb-tag-team">Home</div>
          <div class="seg seg-amber seg-2 seg-score">
            <span class="seg-bg">88</span>
            <span class="seg-fg" id="home-score">00</span>
          </div>
        </div>

        <!-- Center: clock above, period + shots below. -->
        <div class="sb-center">
          <div class="seg seg-red seg-clock">
            <span class="seg-bg" id="time-bg">88:88</span>
            <span class="seg-fg" id="time">20:00</span>
          </div>
          <div class="sb-brand-mark">nevco</div>
          <div class="sb-center-bottom">
            <div class="seg seg-amber seg-2 seg-shot">
              <span class="seg-bg">88</span>
              <span class="seg-fg" id="home-shots">00</span>
            </div>
            <div class="sb-period-stack">
              <div class="sb-period-row">
                <div class="sb-tag">period</div>
                <div class="seg seg-amber seg-1">
                  <span class="seg-bg">8</span>
                  <span class="seg-fg" id="period">1</span>
                </div>
              </div>
              <div class="sb-tag sb-tag-shots">shots on goal</div>
            </div>
            <div class="seg seg-amber seg-2 seg-shot">
              <span class="seg-bg">88</span>
              <span class="seg-fg" id="guest-shots">00</span>
            </div>
          </div>
        </div>

        <!-- Guest score -->
        <div class="sb-cell sb-score-cell">
          <div class="sb-tag sb-tag-team">Guests</div>
          <div class="seg seg-amber seg-2 seg-score">
            <span class="seg-bg">88</span>
            <span class="seg-fg" id="guest-score">00</span>
          </div>
        </div>

        <!-- Guest penalties: mirrored (penalty inside, player outside). -->
        <div class="sb-pens sb-pens-guest" aria-label="guest penalties">
          <div class="sb-pen-row">
            <div class="sb-cell">
              <div class="sb-tag">penalty</div>
              <div class="seg seg-red seg-4">
                <span class="seg-bg">88:88</span>
                <span class="seg-fg" id="guest-pen1-time">0:00</span>
              </div>
            </div>
            <div class="sb-cell">
              <div class="sb-tag">player</div>
              <div class="seg seg-amber seg-2">
                <span class="seg-bg">88</span>
                <span class="seg-fg" id="guest-pen1-player">--</span>
              </div>
            </div>
          </div>
          <div class="sb-pen-row">
            <div class="sb-cell">
              <div class="sb-tag">penalty</div>
              <div class="seg seg-red seg-4">
                <span class="seg-bg">88:88</span>
                <span class="seg-fg" id="guest-pen2-time">0:00</span>
              </div>
            </div>
            <div class="sb-cell">
              <div class="sb-tag">player</div>
              <div class="seg seg-amber seg-2">
                <span class="seg-bg">88</span>
                <span class="seg-fg" id="guest-pen2-player">--</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- ============== CONTROLLER (photo background + hotspots) ============== -->
    <section class="controller" aria-label="MPCW-7 hand controller">
      <!-- Controller display panel sits between scoreboard and button pad.
           Single 16-character red LED window matching the MPCW-7 hand unit. -->
      <div class="ctrl-display">
        <div class="led-window" aria-live="polite">
          <span class="led-bg">8888888888888888</span>
          <span class="led-fg" id="led-text">READY</span>
        </div>
      </div>

      <div class="ctrl-photo">
        <!-- Buttons positioned from hockey_keypad_coordinates.csv (image is 2997 x 1498 px;
             each button is 145 x 55 px). The layer is populated by app.js. -->
        <div class="ctrl-buttons" id="ctrl-buttons" aria-label="MPCW-7 keypad"></div>
      </div>
    </section>

  </div>

  <script src="app.js?v=20260516k"></script>
</body>
</html>
